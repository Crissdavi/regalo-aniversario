<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversario mi amor ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #803acb 0%, #2365d0 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 400px;
            margin: 30px 20px;
            background: rgba(255, 255, 255, 0.85);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #8932db;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .distancia-txt {
            font-style: italic;
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* ESTILOS DEL CARRUSEL DE FOTOS */
        .carrusel {
            position: relative;
            width: 100%;
            height: 280px;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .active {
            display: block;
        }

        .btn-carrusel {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(151, 64, 228, 0.7);
            color: white;
            border: none;
            padding: 12px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50%;
            transition: 0.3s;
            z-index: 10;
        }

        .btn-carrusel:hover {
            background: rgba(75, 30, 159, 0.9);
        }

        .btn-prev { left: 10px; }
        .btn-next { right: 10px; }

        /* CONTADOR */
        .contador {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 25px 0;
        }

        .caja-tiempo {
            background: #6c23da;
            color: white;
            padding: 10px 5px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .numero {
            font-size: 1.4rem;
            font-weight: bold;
            display: block;
        }

        .etiqueta {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .mensaje {
            font-size: 1rem;
            line-height: 1.6;
            color: #555;
            margin-top: 15px;
        }

        .corazon {
            color: #e25c5c;
            font-size: 1.5rem;
            animation: latido 1.2s infinite;
            margin-top: 15px;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¡Feliz Aniversario! ❤️</h1>
        <p class="distancia-txt">No importa la distancia, los kilómetros no separan lo que el corazón une.</p>
        
        <div class="carrusel">
            <img src="foto1.jpeg" alt="Foto 1" class="slide active">
            <img src="foto2.jpeg" alt="Foto 2" class="slide">
            <img src="foto3.jpeg" alt="Foto 3" class="slide">
            <img src="foto4.jpeg" alt="Foto 4" class="slide">
            <img src="foto5.jpeg" alt="Foto 5" class="slide">
            <img src="foto6.jpeg" alt="Foto 6" class="slide">
            <img src="foto7.jpeg" alt="Foto 7" class="slide">
            <img src="foto8.jpeg" alt="Foto 8" class="slide">
            
            <button class="btn-carrusel btn-prev" onclick="cambiarSlideManual(-1)">&#10094;</button>
            <button class="btn-carrusel btn-next" onclick="cambiarSlideManual(1)">&#10095;</button>
        </div>

        <div style="margin-top: 20px;">
            <p style="font-size: 0.85rem; color: #777; margin-bottom: 5px;">🎵 Nuestra canción:</p>
            <audio id="musicaFondo" controls loop style="width: 100%; max-width: 300px;">
                <source src="mi-cancion.mpeg" type="audio/mpeg">
                Tu navegador no soporta el elemento de audio.
            </audio>
        </div>

        <p style="margin-top:20px; font-weight: bold; color: #894ae2;">Llevamos juntos:</p>
        
        <div class="contador">
            <div class="caja-tiempo">
                <span class="numero" id="dias">00</span>
                <span class="etiqueta">Días</span>
            </div>
            <div class="caja-tiempo">
                <span class="numero" id="horas">00</span>
                <span class="etiqueta">Horas</span>
            </div>
            <div class="caja-tiempo">
                <span class="numero" id="minutos">00</span>
                <span class="etiqueta">Min</span>
            </div>
            <div class="caja-tiempo">
                <span class="numero" id="segundos">00</span>
                <span class="etiqueta">Seg</span>
            </div>
        </div>

        <p class="mensaje">
            Cada día que pasa es un día menos para volver a vernos. Gracias por soportarme y amarme. 👩‍❤️‍👨
        </p>

        <div class="corazon">💜</div>
    </div>

    <script>
        // LÓGICA DEL CARRUSEL DE FOTOS (AUTOMÁTICO A 2 SEGUNDOS)
        let slideIndex = 0;
        const slides = document.querySelectorAll(".slide");
        let carruselAutomatico = setInterval(pasarSlideAutomatico, 4000); // 2000 milisegundos = 2 segundos

        function mostrarSlide(n) {
            slides[slideIndex].classList.remove("active");
            slideIndex = n;
            if (slideIndex >= slides.length) { slideIndex = 0; }
            if (slideIndex < 0) { slideIndex = slides.length - 1; }
            slides[slideIndex].classList.add("active");
        }

        function pasarSlideAutomatico() {
            let siguiente = slideIndex + 1;
            mostrarSlide(siguiente);
        }

        // Si el usuario presiona las flechas, el tiempo se reinicia para que no salte de golpe
        function cambiarSlideManual(direccion) {
            clearInterval(carruselAutomatico); // Detiene el reloj por un momento
            mostrarSlide(slideIndex + direccion);
            carruselAutomatico = setInterval(pasarSlideAutomatico, 3000); // Reinicia el reloj de 2 segundos
        }

        // TRUCO DE AUDIO: Autoplay al primer clic en cualquier parte de la pantalla
        const audio = document.getElementById("musicaFondo");
        
        document.body.addEventListener("click", function() {
            if (audio.paused) {
                audio.play().catch(error => console.log("Reproducción automática bloqueada inicialmente por el navegador"));
            }
        }, { once: true }); // "{ once: true }" hace que este truco funcione solo con el primer clic y luego se desactive

        // CONFIGURA AQUÍ TU FECHA DE ANIVERSARIO (Año, Mes - 1, Día, Hora, Minutos)
        // Nota: Enero es 0, Febrero es 1, Marzo es 2... Junio es 5, etc.
        const fechaAniversario = new Date(2026, 3, 6, 2, 45, 45); 

        function actualizarContador() {
            const ahora = new Date();
            const diferencia = telemetry = ahora - fechaAniversario;

            const msPorDia = 1000 * 60 * 60 * 24;
            const msPorHour = 1000 * 60 * 60;
            const msPorMinuto = 1000 * 60;

            const dias = Math.floor(diferencia / msPorDia);
            const horas = Math.floor((diferencia % msPorDia) / msPorHour);
            const minutos = Math.floor((diferencia % msPorHour) / msPorMinuto);
            const segundos = Math.floor((diferencia % msPorMinuto) / 1000);

            document.getElementById('dias').innerText = dias;
            document.getElementById('horas').innerText = horas < 10 ? '0' + horas : horas;
            document.getElementById('minutos').innerText = minutos < 10 ? '0' + minutos : minutos;
            document.getElementById('segundos').innerText = segundos < 10 ? '0' + segundos : segundos;
        }

        setInterval(actualizarContador, 1000);
        actualizarContador();
    </script>
</body>
</html>
